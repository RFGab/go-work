<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/base :: html(title=~{::title}, content=~{::main})}">
<head>
    <title>GoWork - Каталог организаций</title>
</head>
<body>
<main>
    <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
        <div>
            <h1 class="h3 mb-2">Каталог организаций</h1>
            <div class="text-muted">Выберите город и найдите подходящее место для работы.</div>
        </div>
        <a th:href="@{/organizations/new}" class="btn btn-outline-primary">Создать организацию</a>
    </div>

    <form th:action="@{/organizations}" th:object="${filter}" method="get" class="row g-2 align-items-end mb-4">
        <div class="col-md-4">
            <label for="name" class="form-label">Название</label>
            <input id="name" type="text" class="form-control" th:field="*{name}" placeholder="Название организации">
        </div>
        <div class="col-md-4">
            <label for="cityId" class="form-label">Город</label>
            <select id="cityId" class="form-select" th:field="*{cityId}">
                <option value="">Все города</option>
                <option th:each="city : ${cities}"
                        th:value="${city.id}"
                        th:text="${city.name}">Город</option>
            </select>
        </div>
        <input type="hidden" th:field="*{size}">
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Показать</button>
        </div>
        <div class="col-auto">
            <a th:href="@{/organizations}" class="btn btn-outline-secondary">Сбросить</a>
        </div>
    </form>

    <div th:if="${#lists.isEmpty(organizations)}" class="alert alert-light border">
        Организаций по выбранному городу пока нет.
    </div>

    <div class="row g-3">
        <div th:each="organization : ${organizations}" class="col-md-6 col-xl-4">
            <article class="border rounded p-3 h-100">
                <div class="mb-3">
                    <img th:if="${organization.logoFileName}"
                         th:src="@{/img/{fileName}(fileName=${organization.logoFileName})}"
                         alt="Логотип организации"
                         class="img-fluid rounded border w-100"
                         style="height: 140px; object-fit: contain;">
                    <div th:unless="${organization.logoFileName}"
                         class="border rounded bg-light text-muted d-flex align-items-center justify-content-center"
                         style="height: 140px;">
                        Логотип не загружен
                    </div>
                </div>

                <div class="d-flex justify-content-between gap-3 mb-2">
                    <h2 class="h5 mb-0">
                        <a class="text-decoration-none"
                           th:href="@{/organizations/{id}(id=${organization.id})}"
                           th:text="${organization.name}">Организация</a>
                    </h2>
                    <span class="badge text-bg-light" th:text="${organization.roomCount} + ' комнат'">0 комнат</span>
                </div>

                <div class="text-muted small mb-3" th:text="${organization.cityName}">Город</div>
                <p class="mb-3" th:text="${organization.description ?: 'Описание пока не добавлено'}">Описание</p>

                <div class="small text-muted">
                    <div th:if="${organization.contactEmail}" th:text="'Email: ' + ${organization.contactEmail}">Email</div>
                    <div th:if="${organization.contactPhone}" th:text="'Телефон: ' + ${organization.contactPhone}">Телефон</div>
                </div>
            </article>
        </div>
    </div>

    <nav th:if="${organizationsPage.totalPages > 1}" class="mt-4" aria-label="Навигация по страницам организаций">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${organizationsPage.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/organizations(cityId=${filter.cityId},name=${filter.name},size=${filter.size},page=${organizationsPage.number - 1})}">Назад</a>
            </li>
            <li th:each="pageNumber : ${pageNumbers}"
                class="page-item"
                th:classappend="${pageNumber == organizationsPage.number} ? 'active'">
                <a class="page-link"
                   th:href="@{/organizations(cityId=${filter.cityId},name=${filter.name},size=${filter.size},page=${pageNumber})}"
                   th:text="${pageNumber + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${organizationsPage.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/organizations(cityId=${filter.cityId},name=${filter.name},size=${filter.size},page=${organizationsPage.number + 1})}">Вперед</a>
            </li>
        </ul>
    </nav>
</main>
</body>
</html>
