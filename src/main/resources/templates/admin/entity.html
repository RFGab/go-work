<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/base :: html(title=~{::title}, content=~{::main})}">
<head>
    <title th:text="'GoWork - ' + ${adminPage.title}">GoWork - Админка</title>
</head>
<body>
<main>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1" th:text="${adminPage.title}">Раздел</h1>
            <a th:href="@{/admin}" class="btn btn-outline-secondary btn-sm mt-2">Назад в дашборд</a>
        </div>
        <div class="text-muted small">
            Всего: <span th:text="${adminPage.rows.totalElements}">0</span>
        </div>
    </div>

    <div id="adminMessage" class="alert d-none"></div>

    <section th:if="${adminPage.canCreate}" class="border rounded p-3 mb-4">
        <h2 class="h5 mb-3">Создать</h2>
        <form class="admin-form row g-2 align-items-end" th:data-url="@{/admin/api/{entity}(entity=${adminPage.entity})}">
            <div th:each="field : ${adminPage.fields}" class="col-md-3">
                <label class="form-label small" th:for="${'create-' + field.name}" th:text="${field.label}">Поле</label>

                <textarea th:if="${field.type == 'textarea'}"
                          class="form-control"
                          rows="2"
                          th:id="${'create-' + field.name}"
                          th:name="${field.name}"></textarea>

                <select th:if="${field.type == 'select'}"
                        class="form-select"
                        th:id="${'create-' + field.name}"
                        th:name="${field.name}">
                    <option value="">Выберите</option>
                    <option th:each="option : ${field.options}"
                            th:value="${option.value}"
                            th:text="${option.label}">Опция</option>
                </select>

                <input th:if="${field.type != 'textarea' and field.type != 'select' and field.type != 'checkbox'}"
                       class="form-control"
                       th:type="${field.type}"
                       th:id="${'create-' + field.name}"
                       th:name="${field.name}"
                       th:step="${field.type == 'number'} ? '0.01' : null">

                <input th:if="${field.type == 'checkbox'}"
                       class="form-check-input d-block"
                       type="checkbox"
                       value="true"
                       th:id="${'create-' + field.name}"
                       th:name="${field.name}">
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">Создать</button>
            </div>
        </form>
    </section>

    <div class="table-responsive">
        <table class="table table-bordered table-sm align-middle">
            <thead>
            <tr>
                <th style="width: 70px;">ID</th>
                <th th:each="field : ${adminPage.fields}" th:text="${field.label}">Поле</th>
                <th style="width: 190px;">Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(adminPage.rows.content)}">
                <td th:colspan="${adminPage.fields.size() + 2}" class="text-muted text-center py-4">Данных пока нет</td>
            </tr>
            <tr th:each="row : ${adminPage.rows.content}" th:id="${'row-' + row.id}">
                <td th:text="${row.id}">1</td>

                <td th:each="field : ${adminPage.fields}">
                    <form class="admin-form d-flex gap-2"
                          th:id="${'form-' + row.id}"
                          th:data-url="@{/admin/api/{entity}/{id}(entity=${adminPage.entity},id=${row.id})}">
                    </form>

                    <textarea th:if="${field.type == 'textarea'}"
                              class="form-control form-control-sm"
                              rows="2"
                              th:form="${'form-' + row.id}"
                              th:name="${field.name}"
                              th:text="${row.values.get(field.name)}"></textarea>

                    <select th:if="${field.type == 'select'}"
                            class="form-select form-select-sm"
                            th:form="${'form-' + row.id}"
                            th:name="${field.name}">
                        <option value="">Выберите</option>
                        <option th:each="option : ${field.options}"
                                th:value="${option.value}"
                                th:text="${option.label}"
                                th:selected="${option.value == row.values.get(field.name)}">Опция</option>
                    </select>

                    <input th:if="${field.type != 'textarea' and field.type != 'select' and field.type != 'checkbox'}"
                           class="form-control form-control-sm"
                           th:form="${'form-' + row.id}"
                           th:type="${field.type}"
                           th:name="${field.name}"
                           th:value="${row.values.get(field.name)}"
                           th:step="${field.type == 'number'} ? '0.01' : null">

                    <input th:if="${field.type == 'checkbox'}"
                           class="form-check-input"
                           th:form="${'form-' + row.id}"
                           type="checkbox"
                           value="true"
                           th:name="${field.name}"
                           th:checked="${row.values.get(field.name) == 'true'}">
                </td>

                <td>
                    <div class="d-flex gap-2">
                        <button type="submit"
                                class="btn btn-sm btn-success"
                                th:form="${'form-' + row.id}">Сохранить</button>
                        <button type="button"
                                class="btn btn-sm btn-outline-danger admin-delete"
                                th:data-url="@{/admin/api/{entity}/{id}(entity=${adminPage.entity},id=${row.id})}"
                                th:data-row="${'row-' + row.id}">Удалить</button>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <nav th:if="${adminPage.rows.totalPages > 1}" class="mt-3">
        <ul class="pagination">
            <li class="page-item" th:classappend="${adminPage.rows.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/{entity}(entity=${adminPage.entity},page=${adminPage.rows.number - 1},size=${adminPage.rows.size},sort=${sort},direction=${direction})}">Назад</a>
            </li>
            <li th:each="pageNumber : ${pageNumbers}"
                class="page-item"
                th:classappend="${pageNumber == adminPage.rows.number} ? 'active'">
                <a class="page-link"
                   th:href="@{/admin/{entity}(entity=${adminPage.entity},page=${pageNumber},size=${adminPage.rows.size},sort=${sort},direction=${direction})}"
                   th:text="${pageNumber + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${adminPage.rows.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/{entity}(entity=${adminPage.entity},page=${adminPage.rows.number + 1},size=${adminPage.rows.size},sort=${sort},direction=${direction})}">Вперед</a>
            </li>
        </ul>
    </nav>

    <script>
        const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;
        const message = document.getElementById('adminMessage');

        function showMessage(success, text) {
            message.className = success ? 'alert alert-success' : 'alert alert-danger';
            message.textContent = text;
        }

        function headers() {
            const result = {};
            if (csrfToken && csrfHeader) {
                result[csrfHeader] = csrfToken;
            }
            return result;
        }

        document.querySelectorAll('.admin-form').forEach(form => {
            form.addEventListener('submit', async event => {
                event.preventDefault();
                const response = await fetch(form.dataset.url, {
                    method: 'POST',
                    headers: headers(),
                    body: new FormData(form)
                });
                const data = await response.json();
                showMessage(data.success, data.message);
                if (data.success && !form.id) {
                    window.location.reload();
                }
            });
        });

        document.querySelectorAll('.admin-delete').forEach(button => {
            button.addEventListener('click', async () => {
                if (!confirm('Удалить объект?')) {
                    return;
                }
                const response = await fetch(button.dataset.url, {
                    method: 'DELETE',
                    headers: headers()
                });
                const data = await response.json();
                showMessage(data.success, data.message);
                if (data.success) {
                    document.getElementById(button.dataset.row)?.remove();
                }
            });
        });
    </script>
</main>
</body>
</html>
