<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/base :: html(title=~{::title}, content=~{::main})}">
<head>
    <title>GoWork - Registration</title>
</head>
<body>
<main>
    <section class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <h1 class="h3 mb-4 text-center">Registration</h1>

            <div th:if="${globalError}" class="alert alert-danger" th:text="${globalError}"></div>

            <form th:action="@{/auth/register}" th:object="${userForm}" method="post" class="vstack gap-3">
                <div>
                    <label for="email" class="form-label">Email</label>
                    <div class="input-group">
                        <input id="email" type="email" class="form-control" th:field="*{email}" required>
                        <button id="sendCodeBtn" type="button" class="btn btn-outline-secondary">Send code</button>
                    </div>
                    <div class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    <div id="codeStatus" class="form-text"></div>
                </div>

                <div>
                    <label for="emailConfirmationCode" class="form-label">Email code</label>
                    <input id="emailConfirmationCode" type="text" class="form-control" th:field="*{emailConfirmationCode}" maxlength="6" required>
                    <div class="text-danger small" th:if="${#fields.hasErrors('emailConfirmationCode')}" th:errors="*{emailConfirmationCode}"></div>
                </div>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="firstName" class="form-label">First name</label>
                        <input id="firstName" type="text" class="form-control" th:field="*{firstName}" required>
                        <div class="text-danger small" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                    </div>
                    <div class="col-md-6">
                        <label for="lastName" class="form-label">Last name</label>
                        <input id="lastName" type="text" class="form-control" th:field="*{lastName}" required>
                        <div class="text-danger small" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                    </div>
                </div>

                <div>
                    <label for="phone" class="form-label">Phone</label>
                    <input id="phone" type="tel" class="form-control" th:field="*{phone}" required>
                    <div class="text-danger small" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                </div>

                <div>
                    <label for="password" class="form-label">Password</label>
                    <input id="password" type="password" class="form-control" th:field="*{password}" required>
                    <div class="text-danger small" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>

                <div>
                    <label for="confirmPassword" class="form-label">Repeat password</label>
                    <input id="confirmPassword" type="password" class="form-control" th:field="*{confirmPassword}" required>
                    <div class="text-danger small" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                </div>

                <button type="submit" class="btn btn-primary w-100">Create account</button>
            </form>
        </div>
    </section>

    <script>
        const button = document.getElementById('sendCodeBtn');
        const status = document.getElementById('codeStatus');
        const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;

        button?.addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            if (!email) {
                status.textContent = 'Enter email first.';
                status.className = 'form-text text-danger';
                return;
            }

            button.disabled = true;
            status.textContent = 'Sending...';
            status.className = 'form-text';

            try {
                const headers = {};
                if (csrfHeader && csrfToken) {
                    headers[csrfHeader] = csrfToken;
                }

                const response = await fetch(`/auth/confirmMail/${encodeURIComponent(email)}`, {
                    method: 'POST',
                    headers,
                    credentials: 'same-origin'
                });

                status.textContent = response.ok ? 'Code sent.' : 'Could not send code.';
                status.className = response.ok ? 'form-text text-success' : 'form-text text-danger';
            } catch (error) {
                status.textContent = 'Network error.';
                status.className = 'form-text text-danger';
            } finally {
                button.disabled = false;
            }
        });
    </script>
</main>
</body>
</html>
