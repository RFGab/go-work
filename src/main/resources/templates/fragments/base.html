<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" th:fragment="html(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">

    <title th:replace="${title}">GoWork</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>
<header class="border-bottom bg-light mb-4">
    <div class="container py-3">
        <div class="d-flex justify-content-between align-items-center">
            <a th:href="@{/}" class="text-decoration-none text-dark fw-bold fs-4">GoWork</a>

            <nav class="d-flex align-items-center gap-3">
                <a th:href="@{/rooms}" class="text-decoration-none text-secondary">Rooms</a>
                <a th:href="@{/organizations}" class="text-decoration-none text-secondary">Organizations</a>
                <a th:if="${#authorization.expression('isAuthenticated()')}"
                   th:href="@{/bookings/my}"
                   class="text-decoration-none text-secondary">My bookings</a>
                <a th:if="${#authorization.expression('isAuthenticated()')}"
                   th:href="@{/profile}"
                   class="text-decoration-none text-secondary">Profile</a>
                <form th:if="${#authorization.expression('isAuthenticated()')}"
                      th:action="@{/auth/logout}"
                      method="post"
                      class="m-0">
                    <button type="submit" class="btn btn-link p-0 text-decoration-none text-secondary">Logout</button>
                </form>
                <a th:if="${#authorization.expression('!isAuthenticated()')}"
                   th:href="@{/auth/login}"
                   class="text-decoration-none text-secondary">Login</a>
                <a th:if="${#authorization.expression('!isAuthenticated()')}"
                   th:href="@{/auth/register}"
                   class="btn btn-sm btn-primary text-white">Registration</a>
            </nav>
        </div>
    </div>
</header>

<main class="container">
    <div th:replace="${content}"></div>
</main>

<footer class="border-top mt-5 py-4 text-center text-muted small">
    <div class="container">
        <p class="mb-0">2026 GoWork. Study project.</p>
    </div>
</footer>
</body>
</html>
