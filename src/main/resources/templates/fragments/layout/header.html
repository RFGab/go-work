<header th:fragment="header">
    <nav>
        <a th:href="@{/}"><b>GO WORK</b></a>
        <ul>
            <li><a th:href="@{/rooms}">Каталог комнат</a></li>

            <!-- Ссылки для авторизованных -->
            <li sec:authorize="hasRole('ROLE_USER')">
                <a th:href="@{/profile}">Мой профиль</a>
            </li>
            <li sec:authorize="hasRole('ROLE_ADMIN')">
                <a th:href="@{/admin}">Админ-панель</a>
            </li>
            <!-- выход -->
            <li sec:authorize="isAuthenticated()">
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit">Выйти</button>
                </form>
            </li>

            <!-- Ссылки для гостей -->
            <li sec:authorize="!isAuthenticated()">
                <a th:href="@{/login}">Войти</a> |
                <a th:href="@{/register}">Регистрация</a>
            </li>

        </ul>
    </nav>
    <hr>
</header>
